services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-mandiri-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - /var/www/vendor        # <--- ADD THIS LINE: Protects the vendor folder
    depends_on:
      - db
    networks:
      - cbt-network

  db:
    image: mysql:8.0
    container_name: cbt-mandiri-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cbt_db
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_USER: cbt_user
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - cbt-network

networks:
  cbt-network:
    driver: bridge

volumes:
  dbdata:
    driver: local