name: Deploy CBT Mandiri

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SECRET_KEY }}
          script: |
            cd /home/CBT-MandiriPNC
            
            # 1. Sync code
            git pull origin main

            # 2. Refresh containers and volumes
            # Adding --force-recreate ensures the anonymous vendor volume is fresh
            docker compose down
            docker compose up -d --build --force-recreate

            # 3. Wait for DB and Run Laravel tasks
            sleep 5
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan optimize
            docker compose exec -T app php artisan config:clear
            docker compose exec -T app php artisan cache:clear
            docker compose exec -T app php artisan view:clear
            docker compose exec -T app php artisan key:generate --force
          
            
            # 4. Clean up
            docker image prune -f