name: Deploy CBT Mandiri

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SECRET_KEY }}
          script: |
            # 1. Navigate to the project directory
            cd /home/CBT-MandiriPNC

            # 2. Pull the latest code from GitHub
            git pull

            # 3. Build and restart containers in detached mode
            # --build ensures it picks up any changes in your Dockerfile or nginx.conf
            docker compose up -d --build

            # 4. Run Laravel specific commands INSIDE the container
            # We use 'docker compose exec -T' to run commands without a TTY
            docker compose exec app composer install
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan optimize
            
            # 5. Clean up unused images to save disk space on your VPS
            docker image prune -f